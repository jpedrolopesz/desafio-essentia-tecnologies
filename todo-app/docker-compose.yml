services:
  mysql:
    image: mysql:8
    container_name: todo_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: todo_db
    ports:
      - "3307:3306"
    volumes:
      - todo_mysql_data:/var/lib/mysql
      - ./migration.sql:/docker-entrypoint-initdb.d/migration.sql

volumes:
  todo_mysql_data:
